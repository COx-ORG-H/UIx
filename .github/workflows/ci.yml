name: ci

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: stamp-registry.mjs uses `git log -1 --follow` per file;
          # a shallow clone would stamp every file with the grafted HEAD commit.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check

      # inspection aid: the stamped registry exactly as this commit would serve it
      - uses: actions/upload-artifact@v4
        with:
          name: registry-dist
          path: dist/r

